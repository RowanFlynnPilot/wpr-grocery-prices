# wpr-grocery-prices — editorial basket
#
# One row = one tracked item = one BLS Average Price (AP) series.
# `geography` and `series_id` were validated against the live BLS API on
# 2026-06-08. Each item declares EXACTLY ONE authoritative series. There is
# no silent US->Midwest fallback at runtime: if a declared series stops
# returning current data, fetch.py fails loudly so we fix the config on purpose.
#
# geography:
#   midwest -> BLS area 0200 (IL IN IA KS MI MN MO NE ND OH SD WI)
#   us      -> BLS area 0000 (U.S. city average) -- used only where the Midwest
#              regional breakout is missing or stale. Surface this label in the UI.
#
# To re-validate after a BLS revision: python validate_basket.py  (see CLAUDE.md)

settings:
  history_years: 3        # months of trend pulled per item (>=2 needed for YoY)

items:
  # --- Meat & eggs ---
  - { key: ground_beef,    label: "Ground beef, 100% beef",      unit: "per lb",     category: "Meat & eggs", geography: midwest, series_id: APU0200703112 }
