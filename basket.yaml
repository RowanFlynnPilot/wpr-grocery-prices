# wpr-grocery-prices — editorial basket
#
# One row = one tracked item = one BLS Average Price (AP) series.
# `geography` and `series_id` were validated against the live BLS API on
# 2026-06-08. Each item declares EXACTLY ONE authoritative series. There is
# no silent US->Midwest fallback at runtime: if a declared series stops
# returning current data, fetch.py fails loudly so we fix the config on purpose.
#
# geography:
#   midwest -> BLS area 0200 (IL IN IA KS MI MN MO NE ND OH SD WI)
#   us      -> BLS area 0000 (U.S. city average) -- used only where the Midwest
#              regional breakout is missing or stale. Surface this label in the UI.
#
# To re-validate after a BLS revision: python validate_basket.py  (see CLAUDE.md)

settings:
  history_years: 3        # months of trend pulled per item (>=2 needed for YoY)

# Context series — NOT basket items. These power the inflation-adjusted ("real
# dollars") view and the "minutes of work" framing. Same BLS API, validated
# 2026-06-09. CPI is two-tier to mirror the price geography: Midwest items are
# deflated by Midwest CPI, U.S.-average items by U.S. CPI.
context:
  cpi:
    us:      { series_id: CUUR0000SA0, label: "CPI-U, U.S. city average, all items (NSA)" }
    midwest: { series_id: CUUR0200SA0, label: "CPI-U, Midwest region, all items (NSA)" }
  earnings:
    series_id: SMU55000000500000003   # BLS SAE: Wisconsin, total private, AHE all employees (NSA)
    label: "Wisconsin average hourly earnings, private sector"
    geography_label: "Wisconsin"
    unit: "per hour"

# Market basket — a representative weekly staples cart, summed to a dollar total
# readers can track month to month. Quantities are editorial (each in the item's
# own unit) and meant to be edited freely. Mixes Midwest and U.S.-average items;
# the UI says so. The basket trend only spans months where every item reports.
market_basket:
  label: "Weekly staples cart"
  items:
    - { key: ground_beef,    qty: 2 }   # lb
    - { key: chicken_breast, qty: 2 }   # lb
    - { key: eggs,           qty: 1 }   # dozen
    - { key: milk,           qty: 1 }   # gallon
    - { key: cheddar,        qty: 1 }   # lb
    - { key: bread,          qty: 2 }   # loaves (per lb)
    - { key: bananas,        qty: 3 }   # lb
    - { key: potatoes,       qty: 5 }   # lb
    - { key: rice,           qty: 2 }   # lb
    - { key: coffee,         qty: 1 }   # lb

items:
  # --- Meat & eggs ---
  - { key: ground_beef,    label: "Ground beef, 100% beef",      unit: "per lb",     category: "Meat & eggs", geography: midwest, series_id: APU0200703112 }
  - { key: ground_beef_all,label: "All uncooked ground beef",    unit: "per lb",     category: "Meat & eggs", geography: midwest, series_id: APU0200FC1101 }
  - { key: chuck_roast,    label: "Chuck roast, USDA Choice",    unit: "per lb",     category: "Meat & eggs", geography: midwest, series_id: APU0200703213 }
  - { key: steak_sirloin,  label: "Sirloin steak, USDA Choice",  unit: "per lb",     category: "Meat & eggs", geography: midwest, series_id: APU0200703613 }
  - { key: bacon,          label: "Bacon, sliced",               unit: "per lb",     category: "Meat & eggs", geography: midwest, series_id: APU0200704111 }
  - { key: pork_chops,     label: "Pork chops, boneless",        unit: "per lb",     category: "Meat & eggs", geography: midwest, series_id: APU0200704212 }
  - { key: chicken_whole,  label: "Chicken, fresh, whole",       unit: "per lb",     category: "Meat & eggs", geography: midwest, series_id: APU0200706111 }
  - { key: chicken_breast, label: "Chicken breast, boneless",    unit: "per lb",     category: "Meat & eggs", geography: midwest, series_id: APU0200FF1101 }
  - { key: eggs,           label: "Eggs, grade A, large",        unit: "per dozen",  category: "Meat & eggs", geography: us,      series_id: APU0000708111 }

  # --- Dairy ---
  - { key: milk,           label: "Milk, whole, fortified",      unit: "per gallon", category: "Dairy",       geography: us,      series_id: APU0000709112 }
  - { key: cheddar,        label: "Cheddar cheese, natural",     unit: "per lb",     category: "Dairy",       geography: us,      series_id: APU0000710212 }

  # --- Produce ---
  - { key: bananas,        label: "Bananas",                     unit: "per lb",     category: "Produce",     geography: midwest, series_id: APU0200711211 }
  - { key: potatoes,       label: "Potatoes, white",             unit: "per lb",     category: "Produce",     geography: midwest, series_id: APU0200712112 }
  - { key: tomatoes,       label: "Tomatoes, field grown",       unit: "per lb",     category: "Produce",     geography: midwest, series_id: APU0200712311 }
  - { key: oranges,        label: "Oranges, navel",              unit: "per lb",     category: "Produce",     geography: midwest, series_id: APU0200711311 }
  - { key: lemons,         label: "Lemons",                      unit: "per lb",     category: "Produce",     geography: midwest, series_id: APU0200711412 }

  # --- Pantry ---
  - { key: bread,          label: "Bread, white, pan",           unit: "per lb",     category: "Pantry",      geography: midwest, series_id: APU0200702111 }
  - { key: flour,          label: "Flour, white, all purpose",   unit: "per lb",     category: "Pantry",      geography: us,      series_id: APU0000701111 }
  - { key: rice,           label: "Rice, white, long grain",     unit: "per lb",     category: "Pantry",      geography: us,      series_id: APU0000701312 }
  - { key: coffee,         label: "Coffee, ground roast",        unit: "per lb",     category: "Pantry",      geography: us,      series_id: APU0000717311 }
  - { key: sugar,          label: "Sugar, white",                unit: "per lb",     category: "Pantry",      geography: us,      series_id: APU0000715211 }
  - { key: potato_chips,   label: "Potato chips",                unit: "per 16 oz",  category: "Pantry",      geography: midwest, series_id: APU0200718311 }

  # --- Beverages ---
  - { key: beer,           label: "Malt beverages",              unit: "per 16 oz",  category: "Beverages",   geography: midwest, series_id: APU0200720111 }
  - { key: wine,           label: "Wine, table",                 unit: "per liter",  category: "Beverages",   geography: midwest, series_id: APU0200720311 }

  # --- Energy (EIA, not BLS — see docs/decisions/0001-eia-energy-data.md) ---
  # Electricity & natural gas are Wisconsin-specific; motor fuels are Midwest
  # (PADD 2, EIA's petroleum region). Series IDs use EIA's v1 IDs, pulled monthly
  # via the v2 /seriesid endpoint. Validated 2026-06-09.
  # value_factor normalizes EIA units to dollars-per-unit (the frontend shows $):
  #   electricity: cents/kWh -> $/kWh (x0.01)
  #   natural gas: $/Mcf -> $/therm (x0.09643, i.e. 1 Mcf ~= 10.37 therm)
  - { key: electricity,    label: "Electricity",                 unit: "per kWh",    category: "Energy", geography: wisconsin, source: eia, series_id: "ELEC.PRICE.WI-RES.M", value_factor: 0.01 }
  - { key: utility_gas,    label: "Natural gas, residential",    unit: "per therm",  category: "Energy", geography: wisconsin, source: eia, series_id: "NG.N3010WI3.M", value_factor: 0.09643 }
  - { key: gasoline,       label: "Gasoline, unleaded regular",  unit: "per gallon", category: "Energy", geography: padd2,     source: eia, series_id: "PET.EMM_EPMR_PTE_R20_DPG.M" }
  - { key: diesel,         label: "Diesel, on-highway",          unit: "per gallon", category: "Energy", geography: padd2,     source: eia, series_id: "PET.EMD_EPD2DXL0_PTE_R20_DPG.M" }

# Weekly pump prices — the near-real-time companion to the monthly Energy cards
# above. Same EIA petroleum series at WEEKLY frequency (.W), Midwest (PADD 2).
# Surfaced as a distinct "this week" widget so the weekly cadence never mixes
# into the monthly grid. EIA posts these Monday afternoons; the cron refreshes
# Tuesdays. Validated 2026-06-09.
weekly_fuel:
  label: "Pump prices this week"
  geography: padd2
  history_weeks: 78        # ~18 months of weekly points (enough for WoW + YoY)
  items:
    - { key: gasoline_weekly, label: "Gasoline, regular",   unit: "per gallon", series_id: "PET.EMM_EPMR_PTE_R20_DPG.W" }
    - { key: diesel_weekly,   label: "Diesel, on-highway",  unit: "per gallon", series_id: "PET.EMD_EPD2DXL0_PTE_R20_DPG.W" }
