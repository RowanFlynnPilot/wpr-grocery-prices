name: Update prices

# BLS Average Price data for month N publishes ~mid-month N+2 (with the CPI
# release), so refresh on the 16th. EIA posts weekly retail fuel prices Monday
# afternoons, so also refresh Tuesdays for the weekly pump-price widget. The
# full pipeline runs either way; "commit if changed" no-ops weeks with no change.
on:
  schedule:
    - cron: "0 13 16 * *"   # monthly — the 16th (food, CPI, wages, monthly energy)
    - cron: "0 13 * * 2"    # weekly  — Tuesdays (EIA weekly pump prices)
  workflow_dispatch:

# Run the JS action runtimes on Node 24 instead of the deprecated Node 20.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write   # to trigger the Pages deploy after a data change

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: Fetch latest basket
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}   # optional; recommended
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}   # required (energy items)
        run: python fetch.py

      - name: Commit if changed
        id: commit
        run: |
          git config user.name "wpr-bot"
          git config user.email "bot@wausaupilotandreview.com"
          if git diff --quiet -- data/prices.json; then
            echo "No change in prices.json"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git add data/prices.json
            git commit -m "data: refresh prices ($(date -u +%Y-%m-%d))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # A commit pushed with GITHUB_TOKEN does NOT trigger other workflows
      # (GitHub's anti-recursion guard), so the Pages deploy must be dispatched
      # explicitly. workflow_dispatch is exempt from that guard.
      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "Deploy to GitHub Pages"
